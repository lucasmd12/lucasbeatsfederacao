name: lucasbeatsfederacao
description: "Plataforma de beats e música da Federação"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  # UI/UX
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Navigation
  go_router: ^14.6.1
  auto_route: ^9.2.2

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.1
  connectivity_plus: ^6.0.5

  # Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3+1

  # Media & Audio
  just_audio: ^0.9.40
  audio_waveforms: ^1.1.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.4.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Chat & Communication
  socket_io_client: ^2.0.3+1
  emoji_picker_flutter: ^3.0.0
  url_launcher: ^6.3.1

  # Dev Tools
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Build Tools
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  auto_route_generator: ^9.0.0
  retrofit_generator: ^8.2.1
  json_serializable: ^6.8.0
  freezed: ^2.5.7

  # Analysis
  flutter_lints: ^5.0.0
  very_good_analysis: ^6.0.0

  # Testing
  mocktail: ^1.0.4
  faker: ^2.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1a1a1a"
  image: assets/images/splash_logo.png
  branding: assets/images/branding.png
  android_12:
    image: assets/images/splash_logo.png
    color: "#1a1a1a"


